backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "products"
    label: "Products"
    folder: "content/products"
    create: true
    format: "frontmatter"
    fields:
      - { name: "title", label: "Name", widget: "string" }
      - { name: "price", label: "Price", widget: "string" }
      - { name: "image", label: "Image", widget: "image" }
      - { name: "description", label: "Description", widget: "text" }
